<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#FFF8F8;
  --card-pink:#FCE8EC;
  --card-beige:#F5EFE8;
  --card-yellow:#FDF6D3;
  --wine:#8B3A52;
  --wine-dark:#5C1F32;
  --gold:#C4955A;
  --text:#1A1A1A;
  --muted:#888;
  --radius:20px;
}
body{
  background:var(--bg);
  font-family:'Raleway',sans-serif;
  color:var(--text);
  min-height:100svh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}
.page{
  max-width:420px;
  width:100%;
  text-align:center;
}
.check-circle{
  width:72px;
  height:72px;
  border-radius:50%;
  background:var(--card-pink);
  border:2px solid var(--wine);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 28px;
  animation:pop .5s cubic-bezier(.32,.72,0,1) both;
}
@keyframes pop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.tag{
  display:inline-block;
  font-size:9px;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--wine);
  border:1px solid rgba(139,58,82,0.2);
  border-radius:50px;
  padding:5px 14px;
  margin-bottom:18px;
  animation:up .4s .1s both;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:36px;
  font-weight:800;
  line-height:1.1;
  color:var(--text);
  margin-bottom:10px;
  animation:up .4s .15s both;
}
h1 em{color:var(--wine);font-style:italic;}
.sub{
  font-size:14px;
  color:var(--muted);
  line-height:1.6;
  margin-bottom:32px;
  animation:up .4s .2s both;
}
.btn{
  display:block;
  width:100%;
  background:linear-gradient(135deg,#C4506A,#8B3A52);
  color:#fff;
  font-size:15px;
  font-weight:800;
  padding:18px 24px;
  border-radius:50px;
  text-align:center;
  text-decoration:none;
  box-shadow:0 6px 24px rgba(139,58,82,0.3);
  letter-spacing:.3px;
  animation:up .4s .25s both;
}
.btn:active{opacity:.9;}
.note{
  margin-top:16px;
  font-size:11px;
  color:var(--muted);
  line-height:1.6;
  animation:up .4s .3s both;
}
.bonus-pill{
  background:var(--card-yellow);
  border-radius:14px;
  padding:14px 18px;
  margin-top:24px;
  font-size:12px;
  color:#6B5900;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:10px;
  text-align:left;
  animation:up .4s .35s both;
}
</style>
