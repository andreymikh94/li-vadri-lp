  .check {

    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    animation: pop .5s cubic-bezier(.32,.72,0,1) both;
  }

  @keyframes pop {
    from { transform: scale(.6); opacity: 0; }

  }

  .check svg { display: block; }

  .eyebrow {
    font-size: 9px;

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;

  .btn {

    background: #8C1A2A;
    color: #fff;
    font-family: 'Raleway', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: background .2s;
    animation: up .5s .25s ease both;
  }

  .btn:active { background: #6A1120; }

  .note {
    margin-top: 16px;
    font-size: 11px;
    font-weight: 300;
    color: #6A6360;
    line-height: 1.6;
    animation: up .5s .3s ease both;
  }

  @keyframes up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
